<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#0b0b0b" />
		<title>Can’t load — Health</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
				padding-top: calc(24px + env(safe-area-inset-top, 0px));
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					'Segoe UI',
					sans-serif;
				background:
					radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.065) 1px, transparent 0),
					#0b0b0b;
				background-size: 18px 18px;
				color: #f4f4f0;
				text-align: center;
				-webkit-font-smoothing: antialiased;
			}
			.card {
				max-width: 340px;
				width: 100%;
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 20px;
				padding: 32px 26px 28px;
				background: linear-gradient(180deg, #181818 0%, #121212 100%);
				box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
			}
			.eyebrow {
				margin: 0 0 14px;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				font-family: ui-monospace, 'SF Mono', monospace;
				color: #e8a54b;
			}
			h1 {
				margin: 0 0 14px;
				font-size: 20px;
				font-weight: 600;
				line-height: 1.25;
				letter-spacing: -0.02em;
				color: #f4f4f0;
			}
			p {
				margin: 0 0 26px;
				font-size: 15px;
				line-height: 1.55;
				color: #b9b9b2;
			}
			button {
				appearance: none;
				width: 100%;
				margin: 0;
				padding: 14px 18px;
				border-radius: 14px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: #f4f4f0;
				color: #0b0b0b;
				font-size: 15px;
				font-weight: 600;
				font-family: inherit;
				cursor: pointer;
				transition:
					transform 0.12s ease,
					background 0.15s ease;
			}
			button:hover {
				background: #ffffff;
			}
			button:active {
				transform: scale(0.985);
			}
			button:focus-visible {
				outline: 2px solid #e8a54b;
				outline-offset: 3px;
			}
			.hint {
				margin: 16px 0 0;
				font-size: 12px;
				line-height: 1.45;
				color: rgba(185, 185, 178, 0.75);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<p class="eyebrow">Load failed</p>
			<h1>Couldn’t load the app shell</h1>
			<p>
				Your device can show Wi‑Fi or cellular even when this site is unreachable, blocked, or
				timing out. Your saved plan stays on this device.
			</p>
			<button type="button" id="retry">Try again</button>
			<p class="hint">If this keeps happening, check VPN, DNS filters, or try a different network.</p>
		</div>
		<script>
			document.getElementById('retry').addEventListener('click', function () {
				location.reload();
			});
		</script>
	</body>
</html>
